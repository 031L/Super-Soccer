spring:
  application:
    name: Java-Ai
  profiles:
    active: local
  ai:
    model:
      embedding: dashscope
    dashscope:
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
          text-type: document
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        max-document-batch-size: 1000
  datasource:
    url: jdbc:postgresql://localhost:5432/Super-Soccer
    username: postgres
    password:
    driver-class-name: org.postgresql.Driver
server:
    port: 8123
    servlet:
      context-path: /api
# springdoc-openapi ??????
springdoc:
    swagger-ui:
      path: /swagger-ui.html
      tags-sorter: alpha
      operations-sorter: alpha
    api-docs:
      path: /v3/api-docs
    group-configs:
      - group: 'default'
        paths-to-match: '/**'
        packages-to-scan: com.example.javaai.controller
# knife4j???????????????
knife4j:
    enable: true
    setting:
      language: zh_cn
# searchApi
search-api:
  api-key:


app:
  football:
    redis:
      # 完整 Key = keys.{type} + matchId + keySuffix
      # 例如 jczqDetail::1366392:false、jczqOuzhi::1366392:false、jczqYazhi::1366392:false
      key-suffix: ":false"
      legacy-key-fallback: true
      keys:
        detail: "jczqDetail::"
        shuju: "jczqShuju::"
        ouzhi: "jczqOuzhi::"
        ouzhi-changes: "jczqOuzhi::changes:"
        yazhi: "jczqYazhi::"
        yazhi-changes: "jczqYazhi::changes:"
        touzhu: "jczqTouzhu::"
      # jczqOuzhi 百家欧盘：仅保留官方竞彩 + 5 家主流公司（500.com companyId）
      ouzhi-filter:
        enabled: true
        company-ids:
          - "1"      # 竞彩官方
          - "293"    # 威廉希尔
          - "3"      # bet365
          - "2"      # 立博
          - "4"      # Interwetten
          - "5"      # 澳门
      # jczqYazhi 百家亚盘：与欧盘相同的主流公司 companyId（数据中不存在的 ID 会自动跳过）
      yazhi-filter:
        enabled: true
        company-ids:
          - "1"
          - "293"
          - "3"
          - "2"
          - "4"
          - "5"
  ai:
    # Agent 提示词模板（与 knowledge 知识库目录分离）
    prompt:
      document-patterns: classpath:/document/football/**/*.md,classpath:/document/football/**/*.st
    vectorstore:
      # 知识库 Markdown 路径（与 Agent 提示词目录分离，避免提示词被误入库）
      knowledge-patterns: classpath:/document/knowledge/**/*.md
      chunk-size: 512
      ingest-on-startup: false
      # 入库前先删除 source=knowledge 旧数据，避免重复 /ingest 叠加
      ingest-replace-existing: true
      search-top-k: 5
      search-similarity-threshold: 0.6
      # 通用 Agent 知识检索：仅 PGVector 语义搜索，无命中时不注入知识库
      general-agent-rag-enabled: true
      general-agent-direct-read-fallback: false
    football:
      # 各 Agent 模型配置（由 FootballAgentsModelProperties 读取）
      agents:
        # 数据 Agent 专用模型（含 Redis 数据整理、联网搜索数据 Agent）
        data:
          model: qwen3-32b
          enable-thinking: true
        # 推演 Agent 专用模型
        simulation:
          model: qwen3.7-plus
          enable-thinking: true
          multi-model: true
        # 战术 Agent 专用模型
        tactical:
          model: qwen3-max
          enable-thinking: true
        # 综合 Agent 专用模型
        synthesis:
          model: qwen3.7-plus
          enable-thinking: true
          multi-model: true
        # 通用问答 Agent 专用模型（非比赛分析路径）
        general:
          model: qwen-max
          enable-thinking: true
    model:
      primary: qwen-max
      enable-thinking: true


